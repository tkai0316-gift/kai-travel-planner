<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>行程分享 · Kai Travel</title>
  <meta name="robots" content="noindex">
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- Loading -->
<div id="share-loading">
  <div class="share-loading-icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#0EA5E9" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
  </div>
  載入分享行程中...
</div>

<!-- Main App (read-only) -->
<div id="app">

  <!-- Left Panel -->
  <div id="left-panel">

    <!-- Header -->
    <div class="panel-header">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0EA5E9" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <div style="flex:1;min-width:0">
        <div class="panel-title">Kai Travel</div>
        <select id="trip-selector" style="font-size:11px;color:var(--c-muted);background:transparent;border:none;outline:none;max-width:200px;font-family:inherit">
          <option value="">（唯讀分享）</option>
        </select>
      </div>
      <span class="badge badge-readonly">唯讀</span>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button id="tab-trips"  class="tab-btn active">行程</button>
      <button id="tab-budget" class="tab-btn">預算</button>
      <button id="tab-prefs"  class="tab-btn">偏好</button>
    </div>

    <!-- Panel Content -->
    <div id="panel-content">
      <div id="panel-trips">
        <div id="timeline-content"><div class="empty-state">載入中...</div></div>
      </div>
      <div id="panel-budget" style="display:none">
        <div id="budget-content"></div>
      </div>
      <div id="panel-prefs" style="display:none">
        <div id="prefs-content"></div>
      </div>
    </div>
  </div>

  <!-- Map Area -->
  <div id="map-container">
    <div id="map"></div>
  </div>

</div>

<!-- Mobile panel toggle -->
<button id="panel-toggle" aria-label="開啟選單">
  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>

<script>
  if (window.innerWidth < 768) document.getElementById('panel-toggle').style.display = 'flex';
  window.addEventListener('resize', () => {
    document.getElementById('panel-toggle').style.display = window.innerWidth < 768 ? 'flex' : 'none';
  });
  const ICON_MENU = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>`;
  const ICON_CLOSE = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
  document.getElementById('panel-toggle')?.addEventListener('click', () => {
    const panel = document.getElementById('left-panel');
    const btn = document.getElementById('panel-toggle');
    const isOpen = panel?.classList.toggle('panel-open');
    if (btn) btn.innerHTML = isOpen ? ICON_CLOSE : ICON_MENU;
  });
</script>

<script type="module" src="js/share.js"></script>
</body>
</html>
