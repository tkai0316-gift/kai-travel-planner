<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>行程分享 · Kai Travel</title>
  <meta name="robots" content="noindex">
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #e2e8f0; overflow: hidden; height: 100dvh; }
    #app { height: 100dvh; overflow: hidden; }
    #app.ready { display: flex !important; }
    #left-panel { width: 400px; flex-shrink: 0; display: flex; flex-direction: column; height: 100%; background: white; box-shadow: 2px 0 12px rgba(0,0,0,.08); z-index: 20; }
    #panel-content { flex: 1; overflow-y: auto; }
    #map-container { flex: 1; position: relative; }
    #map { position: absolute; inset: 0; }
    .maplibregl-canvas { outline: none; }
    .maplibregl-popup-content { border-radius: 8px; font-size: 13px; padding: 8px 12px; }
    @media (max-width: 767px) {
      #left-panel { position: fixed; top: 0; bottom: 0; left: 0; transform: translateX(-100%); transition: transform .3s; z-index: 40; }
      #left-panel.panel-open { transform: translateX(0); }
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="share-loading" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:white;color:#64748b;font-size:14px;gap:12px">
  <span style="font-size:40px">🗺️</span>
  載入分享行程中...
</div>

<!-- Main App (read-only) -->
<div id="app" style="display:none;height:100dvh;overflow:hidden">

  <!-- Left Panel -->
  <div id="left-panel">

    <!-- Header -->
    <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #f1f5f9;flex-shrink:0">
      <span style="font-size:20px">🗺️</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700;color:#1e293b">Kai Travel</div>
        <select id="trip-selector" style="font-size:11px;color:#64748b;background:transparent;border:none;outline:none;max-width:200px">
          <option value="">（唯讀分享）</option>
        </select>
      </div>
      <span style="font-size:11px;padding:2px 8px;border-radius:20px;background:#fef3c7;color:#92400e">唯讀</span>
    </div>

    <!-- Tabs -->
    <div style="display:flex;border-bottom:1px solid #f1f5f9;flex-shrink:0">
      <button id="tab-trips" style="flex:1;padding:10px 0;font-size:12px;font-weight:500;border:none;background:transparent;cursor:pointer;border-bottom:2px solid #0ea5e9;color:#0284c7">行程</button>
      <button id="tab-budget" style="flex:1;padding:10px 0;font-size:12px;font-weight:500;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;color:#64748b">預算</button>
      <button id="tab-prefs" style="flex:1;padding:10px 0;font-size:12px;font-weight:500;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;color:#64748b">偏好</button>
    </div>

    <!-- Panel Content -->
    <div id="panel-content">
      <div id="panel-trips">
        <div id="timeline-content"><div style="padding:24px;text-align:center;color:#94a3b8;font-size:13px">載入中...</div></div>
      </div>
      <div id="panel-budget" style="display:none">
        <div id="budget-content"></div>
      </div>
      <div id="panel-prefs" style="display:none">
        <div id="prefs-content"></div>
      </div>
    </div>
  </div>

  <!-- Map Area -->
  <div id="map-container">
    <div id="map"></div>
  </div>

</div>

<!-- Mobile panel toggle -->
<button id="panel-toggle" style="display:none;position:fixed;bottom:24px;right:24px;z-index:30;width:48px;height:48px;border-radius:50%;background:#0284c7;color:white;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2)">☰</button>

<script>
  if (window.innerWidth < 768) document.getElementById('panel-toggle').style.display = 'flex';
  document.getElementById('panel-toggle')?.addEventListener('click', () => {
    document.getElementById('left-panel')?.classList.toggle('panel-open');
  });
</script>

<script type="module" src="js/share.js"></script>
</body>
</html>
