<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kai Travel Planner</title>
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4/dist/exceljs.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; background: #e2e8f0; overflow: hidden; height: 100dvh; }
    #app { display: none; height: 100dvh; overflow: hidden; }
    #app.ready { display: flex !important; }
    #left-panel { width: 400px; flex-shrink: 0; display: flex; flex-direction: column; height: 100%; background: white; box-shadow: 2px 0 12px rgba(0,0,0,.08); z-index: 20; }
    #panel-content { flex: 1; overflow-y: auto; }
    #map-container { flex: 1; position: relative; }
    #map { position: absolute; inset: 0; }
    .maplibregl-canvas { outline: none; }
    .maplibregl-popup-content { border-radius: 8px; font-size: 13px; padding: 8px 12px; }
    @media (max-width: 767px) {
      #left-panel { position: fixed; top: 0; bottom: 0; left: 0; transform: translateX(-100%); transition: transform .3s; z-index: 40; }
      #left-panel.panel-open { transform: translateX(0); }
    }
  </style>
</head>
<body>

<!-- Auth Overlay -->
<div id="auth-overlay" style="display:flex;position:fixed;inset:0;z-index:50;align-items:center;justify-content:center;background:rgba(15,23,42,.85);backdrop-filter:blur(4px)">
  <div style="background:white;border-radius:20px;box-shadow:0 24px 48px rgba(0,0,0,.2);padding:32px;width:100%;max-width:360px;margin:16px">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:40px;margin-bottom:8px">🗺️</div>
      <h1 style="font-size:20px;font-weight:700;color:#1e293b">Kai Travel Planner</h1>
      <p style="font-size:13px;color:#94a3b8;margin-top:4px">登入以存取你的行程</p>
    </div>

    <form id="auth-email-form">
      <label style="display:block;font-size:13px;font-weight:500;color:#475569;margin-bottom:6px">電子郵件</label>
      <input id="auth-email-input" type="email" required autocomplete="email" placeholder="your@email.com"
        style="width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;margin-bottom:12px;transition:border-color .2s"
        onfocus="this.style.borderColor='#38bdf8'" onblur="this.style.borderColor='#e2e8f0'">
      <button type="submit"
        style="width:100%;padding:11px;background:#0284c7;color:white;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer">
        傳送驗證碼
      </button>
    </form>

    <form id="auth-otp-form" style="display:none">
      <p style="font-size:13px;color:#475569;margin-bottom:12px">驗證碼已傳送至 <span id="auth-email-display" style="font-weight:600;color:#1e293b"></span></p>
      <label style="display:block;font-size:13px;font-weight:500;color:#475569;margin-bottom:6px">6 位數驗證碼</label>
      <input id="auth-otp-input" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required autocomplete="one-time-code"
        placeholder="000000"
        style="width:100%;padding:12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:20px;text-align:center;letter-spacing:.3em;outline:none;margin-bottom:12px;transition:border-color .2s"
        onfocus="this.style.borderColor='#38bdf8'" onblur="this.style.borderColor='#e2e8f0'">
      <button type="submit"
        style="width:100%;padding:11px;background:#0284c7;color:white;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer">
        登入
      </button>
    </form>

    <p id="auth-error" style="display:none;margin-top:12px;font-size:12px;color:#dc2626;text-align:center"></p>
  </div>
</div>

<!-- Offline Banner -->
<div id="offline-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:40;background:#d97706;color:white;font-size:12px;text-align:center;padding:6px 16px">
  您目前處於離線狀態，正顯示快取資料，暫不支援編輯修改
</div>

<!-- Main App -->
<div id="app" style="display:none;height:100dvh;overflow:hidden">

  <!-- Left Panel -->
  <div id="left-panel">

    <!-- Header -->
    <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #f1f5f9;flex-shrink:0">
      <span style="font-size:20px">🗺️</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700;color:#1e293b">Kai Travel</div>
        <select id="trip-selector" style="font-size:11px;color:#64748b;background:transparent;border:none;outline:none;max-width:200px;cursor:pointer">
          <option value="">載入中...</option>
        </select>
      </div>
      <div id="online-dot" style="width:8px;height:8px;border-radius:50%;background:#34d399;flex-shrink:0" title="連線狀態"></div>
      <button id="signout-btn" title="登出" style="font-size:14px;color:#94a3b8;background:none;border:none;cursor:pointer;padding:4px">⏏</button>
    </div>

    <!-- Tabs -->
    <div style="display:flex;border-bottom:1px solid #f1f5f9;flex-shrink:0">
      <button id="tab-trips" style="flex:1;padding:10px 0;font-size:12px;font-weight:500;border:none;background:transparent;cursor:pointer;border-bottom:2px solid #0ea5e9;color:#0284c7">行程</button>
      <button id="tab-budget" style="flex:1;padding:10px 0;font-size:12px;font-weight:500;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;color:#64748b">預算</button>
      <button id="tab-prefs" style="flex:1;padding:10px 0;font-size:12px;font-weight:500;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;color:#64748b">偏好</button>
      <button id="tab-data" style="flex:1;padding:10px 0;font-size:12px;font-weight:500;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;color:#64748b">資料</button>
    </div>

    <!-- Panel Content -->
    <div id="panel-content">
      <div id="panel-trips">
        <div id="timeline-content">
          <div style="padding:24px;text-align:center;color:#94a3b8;font-size:13px">載入中...</div>
        </div>
      </div>
      <div id="panel-budget" style="display:none">
        <div id="budget-content"><div style="padding:24px;text-align:center;color:#94a3b8;font-size:13px">載入中...</div></div>
      </div>
      <div id="panel-prefs" style="display:none">
        <div id="prefs-content"><div style="padding:24px;text-align:center;color:#94a3b8;font-size:13px">載入中...</div></div>
      </div>
      <div id="panel-data" style="display:none">
        <div id="data-content"><div style="padding:24px;text-align:center;color:#94a3b8;font-size:13px">載入中...</div></div>
      </div>
    </div>
  </div>

  <!-- Map Area -->
  <div id="map-container">
    <div id="map"></div>
  </div>

</div>

<!-- Mobile panel toggle -->
<button id="panel-toggle" style="display:none;position:fixed;bottom:24px;right:24px;z-index:30;width:48px;height:48px;border-radius:50%;background:#0284c7;color:white;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2)">☰</button>

<script>
  // Show mobile toggle on small screens
  if (window.innerWidth < 768) document.getElementById('panel-toggle').style.display = 'flex';
  window.addEventListener('resize', () => {
    document.getElementById('panel-toggle').style.display = window.innerWidth < 768 ? 'flex' : 'none';
  });
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(console.warn);
  }
</script>
<script type="module" src="js/app.js"></script>
</body>
</html>
