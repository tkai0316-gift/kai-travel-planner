<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kai Travel Planner</title>
  <meta name="theme-color" content="#0B7FA5">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4/dist/exceljs.min.js"></script>
</head>
<body>

<!-- Auth Overlay -->
<div id="auth-overlay">
  <div class="auth-card">
    <div class="auth-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#0B7FA5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    </div>
    <h1 class="auth-title">Kai Travel Planner</h1>
    <p class="auth-sub">登入以存取你的行程</p>

    <form id="auth-email-form">
      <label class="auth-label" for="auth-email-input">電子郵件</label>
      <input id="auth-email-input" class="auth-input" type="email" required autocomplete="email" placeholder="your@email.com">
      <button type="submit" class="auth-btn">傳送驗證碼</button>
    </form>

    <form id="auth-otp-form" style="display:none">
      <p style="font-size:13px;color:#475569;margin-bottom:12px">驗證碼已傳送至 <span id="auth-email-display" style="font-weight:600;color:var(--c-text)"></span></p>
      <label class="auth-label" for="auth-otp-input">8 位數驗證碼</label>
      <input id="auth-otp-input" class="auth-input auth-input-otp" type="text" inputmode="numeric" pattern="[0-9]{8}" maxlength="8" required autocomplete="one-time-code" placeholder="00000000">
      <button type="submit" class="auth-btn">登入</button>
    </form>

    <p id="auth-error" class="auth-error"></p>
  </div>
</div>

<!-- Offline Banner -->
<div id="offline-banner">您目前處於離線狀態，正顯示快取資料，暫不支援編輯修改</div>

<!-- Main App -->
<div id="app">

  <!-- Left Panel -->
  <div id="left-panel">

    <!-- Header -->
    <div class="panel-header">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0B7FA5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <div style="flex:1;min-width:0;position:relative">
        <div class="panel-title">Kai Travel</div>
        <button id="trip-selector-btn" class="trip-sel-btn" type="button">
          <span id="trip-selector-label">載入中...</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <ul id="trip-selector-list" class="trip-dropdown" style="display:none"></ul>
      </div>
      <div id="online-dot" title="連線狀態"></div>
      <button id="signout-btn" title="登出" style="background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;color:var(--c-muted-lt)">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button id="tab-trips"  class="tab-btn active"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>行程</button>
      <button id="tab-budget" class="tab-btn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>預算</button>
      <button id="tab-prefs"  class="tab-btn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>偏好</button>
      <button id="tab-data"   class="tab-btn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>資料</button>
    </div>

    <!-- Panel Content -->
    <div id="panel-content">
      <div id="panel-trips">
        <div id="day-tabs-container" class="day-tabs-container"></div>
        <div id="timeline-content"><div class="empty-state">載入中...</div></div>
      </div>
      <div id="panel-budget" style="display:none">
        <div id="budget-content"><div class="empty-state">載入中...</div></div>
      </div>
      <div id="panel-prefs" style="display:none">
        <div id="prefs-content"><div class="empty-state">載入中...</div></div>
      </div>
      <div id="panel-data" style="display:none">
        <div id="data-content"><div class="empty-state">載入中...</div></div>
      </div>
    </div>
  </div>

  <!-- Map Area -->
  <div id="map-container">
    <div id="map"></div>
  </div>

</div>

<!-- Mobile panel toggle -->
<button id="panel-toggle" aria-label="開啟選單">
  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>

<script>
  if (window.innerWidth < 768) document.getElementById('panel-toggle').style.display = 'flex';
  window.addEventListener('resize', () => {
    document.getElementById('panel-toggle').style.display = window.innerWidth < 768 ? 'flex' : 'none';
  });
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(console.warn);
  }
</script>
<!-- Trip Modal -->
<div class="modal-overlay" id="trip-modal">
  <div class="modal-card">
    <div class="modal-header">
      <span class="modal-title" id="trip-modal-title">新增行程</span>
      <button class="modal-close" id="trip-modal-close" aria-label="關閉">×</button>
    </div>
    <div class="modal-body" id="trip-modal-body"></div>
    <div class="modal-footer" id="trip-modal-footer"></div>
  </div>
</div>

<!-- Segment Modal -->
<div class="modal-overlay" id="seg-modal">
  <div class="modal-card">
    <div class="modal-header">
      <span class="modal-title" id="seg-modal-title">新增分段</span>
      <button class="modal-close" id="seg-modal-close" aria-label="關閉">×</button>
    </div>
    <div class="modal-body" id="seg-modal-body"></div>
    <div class="modal-footer" id="seg-modal-footer"></div>
  </div>
</div>

<!-- Day Modal -->
<div class="modal-overlay" id="day-modal">
  <div class="modal-card">
    <div class="modal-header">
      <span class="modal-title" id="day-modal-title">新增日程</span>
      <button class="modal-close" id="day-modal-close" aria-label="關閉">×</button>
    </div>
    <div class="modal-body" id="day-modal-body"></div>
    <div class="modal-footer" id="day-modal-footer"></div>
  </div>
</div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal-card" style="max-width:360px">
    <div class="modal-header">
      <span class="modal-title" id="confirm-title">確認</span>
    </div>
    <div class="modal-body">
      <p id="confirm-message" style="font-size:14px;color:var(--c-text-2);line-height:1.6"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="confirm-cancel">取消</button>
      <button class="btn btn-danger" id="confirm-ok">確認刪除</button>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
